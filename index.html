<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: rgba(255,255,255,0.08);
  --text: #e8eaf0;
  --text-muted: rgba(255,255,255,0.5);
  --text-muted2: rgba(255,255,255,0.35);
  --accent: #f0c040;
  --accent-dim: rgba(240,192,64,0.15);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

/* Header */
.header { text-align: center; padding: 40px 0 30px; }
.header-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.header h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 36px; font-weight: 700; margin-bottom: 6px; }
.header-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

/* Stats Bar */
.stats-bar {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  padding: 16px; background: var(--surface); border-radius: 12px;
  border: 1px solid var(--border); margin-bottom: 30px;
}
.stat { text-align: center; min-width: 80px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted2); }

/* Legend */
.legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Day Cards */
.day-card {
  border: 1px solid var(--border); border-radius: 14px;
  margin-bottom: 8px; overflow: hidden;
  transition: all 0.2s ease;
}
.day-card.open { background: var(--surface); border-color: rgba(255,255,255,0.12); }
.day-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; user-select: none;
  background: none; border: none; width: 100%;
  color: var(--text); font-family: inherit; text-align: left;
}
.day-header:hover { background: rgba(255,255,255,0.02); }
.day-icon { font-size: 24px; line-height: 1; }
.day-info { flex: 1; min-width: 0; }
.day-meta { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted2); }
.day-title { font-size: 16px; font-weight: 600; margin-top: 2px; }
.day-badge {
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06); color: var(--text-muted);
  white-space: nowrap;
}
.day-progress {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
.day-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.day-arrow { font-size: 16px; color: var(--text-muted2); transition: transform 0.2s; }
.day-card.open .day-arrow { transform: rotate(180deg); }

/* Day Content */
.day-content { padding: 0 16px 16px; }
.day-divider { border-top: 1px solid var(--border); margin-bottom: 14px; }

/* Activity Items */
.activity-item {
  display: flex; gap: 10px; padding: 10px 12px;
  border-radius: 10px; margin-bottom: 6px;
  align-items: flex-start; position: relative;
  transition: opacity 0.2s;
}
.activity-item.done { opacity: 0.5; }
.activity-item.done .activity-label { text-decoration: line-through; }
.activity-check {
  width: 20px; height: 20px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.2);
  background: none; cursor: pointer; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent; transition: all 0.15s;
}
.activity-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.activity-time {
  min-width: 65px; font-size: 11px; font-weight: 700;
  padding-top: 3px; letter-spacing: 0.3px;
}
.activity-label { font-size: 13px; line-height: 1.5; flex: 1; }
.activity-remove {
  background: none; border: none; color: var(--text-muted2);
  cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0;
  transition: opacity 0.15s;
}
.activity-item:hover .activity-remove { opacity: 1; }

/* Type Colors */
.type-activity { background: var(--green-dim); }
.type-activity .activity-time { color: var(--green); }
.type-activity .activity-label { color: #78d890; }
.type-food { background: var(--orange-dim); }
.type-food .activity-time { color: var(--orange); }
.type-food .activity-label { color: #e8b868; }
.type-beach { background: var(--cyan-dim); }
.type-beach .activity-time { color: var(--cyan); }
.type-beach .activity-label { color: #70e0f8; }
.type-transport { background: rgba(140,160,190,0.1); }
.type-transport .activity-time { color: #90a8c0; }
.type-transport .activity-label { color: #b0c4d8; }
.type-hotel { background: var(--purple-dim); }
.type-hotel .activity-time { color: var(--purple); }
.type-hotel .activity-label { color: #c8b0e8; }

/* Add Activity */
.add-activity-row {
  display: flex; gap: 6px; margin-top: 10px;
}
.add-input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 13px;
}
.add-input::placeholder { color: var(--text-muted2); }
.add-input:focus { outline: none; border-color: var(--accent); }
.add-select {
  padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 12px;
}
.add-select:focus { outline: none; border-color: var(--accent); }
.add-time-input {
  width: 80px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 12px;
}
.add-btn {
  padding: 8px 14px; border-radius: 8px; border: none;
  background: var(--accent); color: #000; font-weight: 600;
  cursor: pointer; font-size: 13px; white-space: nowrap;
}
.add-btn:hover { background: #f5d060; }

/* Tip Box */
.tip-box {
  margin-top: 14px; padding: 12px 14px;
  background: var(--accent-dim); border-radius: 10px;
  border-left: 3px solid var(--accent);
}
.tip-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.tip-text { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.65); }

/* Day Notes */
.day-notes {
  margin-top: 10px;
}
.notes-textarea {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 12px;
  resize: vertical; min-height: 50px; line-height: 1.5;
}
.notes-textarea::placeholder { color: var(--text-muted2); }
.notes-textarea:focus { outline: none; border-color: var(--accent); }

/* Cash Estimate */
.cash-estimate {
  margin-top: 8px; font-size: 11px; color: var(--text-muted2);
  text-align: right;
}

/* Footer */
.footer {
  margin-top: 30px; padding: 20px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border);
  text-align: center;
}
.footer-total-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.footer-total { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; }
.footer-sub { font-size: 12px; color: var(--text-muted2); margin-top: 4px; }

/* Booking Checklist */
.booking-section {
  margin-top: 20px; padding: 20px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border);

.booking-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.booking-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.booking-item:last-child { border-bottom: none; }
.booking-status {
  padding: 3px 10px; border-radius: 20px; font-size: 10px;
  font-weight: 600; cursor: pointer; user-select: none;
  letter-spacing: 0.5px;
}
.status-pending { background: var(--red-dim); color: var(--red); }
.status-booked { background: var(--green-dim); color: var(--green); }
.booking-name { flex: 1; }

/* Reset Button */
.reset-section { text-align: center; margin-top: 20px; }
.reset-btn {
  padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
  background: none; color: var(--text-muted); cursor: pointer;
  font-size: 12px; font-family: inherit;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

@media (max-width: 600px) {
  .header h1 { font-size: 28px; }
  .stats-bar { gap: 8px; padding: 12px; }
  .stat-value { font-size: 18px; }
  .add-activity-row { flex-wrap: wrap; }
  .add-time-input { width: 100%; }
  .add-select { width: 100%; }
  .activity-remove { opacity: 1; }
}

  margin-bottom: 20px; padding: 16px; border-radius: 12px;

.volcano-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.volcano-link {

}

.volcano-info { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; }

/* Add-ons */
.addons-box {
  margin-top: 10px; padding: 10px 14px;
  background: var(--blue-dim); border-radius: 10px;
  border-left: 3px solid var(--blue);

.addons-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
.addon-item { font-size: 12px; color: rgba(255,255,255,0.55); padding: 2px 0; }

/* Booking Details Expandable */
.booking-details-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 3px 9px; border-radius: 5px;
  background: none; border: 1px solid rgba(96,165,250,0.3);

.booking-details-toggle .bd-arrow { transition: transform 0.2s; display: inline-block; }
.booking-details-toggle.open .bd-arrow { transform: rotate(90deg); }
.booking-details-card {
  margin-top: 8px; padding: 12px 14px;
  background: var(--blue-dim); border-radius: 10px;
  border-left: 3px solid var(--blue); display: none;
}
.booking-details-card.open { display: block; }
.booking-detail-section {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--blue); margin: 10px 0 4px; font-weight: 700;
}
.booking-detail-section:first-child { margin-top: 0; }
.booking-detail-row { font-size: 12px; color: rgba(255,255,255,0.65); padding: 2px 0; line-height: 1.6; }
.booking-detail-label { color: rgba(255,255,255,0.88); font-weight: 600; }
.booking-detail-link { color: var(--blue); text-decoration: none; font-size: 12px; }
.booking-detail-link:hover { text-decoration: underline; }
.booking-detail-note { font-size: 12px; color: rgba(255,255,255,0.5); padding: 2px 0; line-height: 1.6; }
.booking-detail-warning { font-size: 12px; color: var(--orange); padding: 2px 0; line-height: 1.6; }
.activity-item.done .booking-details-toggle { opacity: 0.6; text-decoration: none !important; }

function loadState() {
  try {
    const saved = localStorage.getItem('hawaii-trip-2026-v3');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { days: DEFAULT_DAYS, bookings: DEFAULT_BOOKINGS, openDay: 0 };
}

function saveState(state) {
  try { localStorage.setItem('hawaii-trip-2026-v3', JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function getStats() {
  let total = 0, done = 0;
  state.days.forEach(d => { d.items.forEach(i => { total++; if (i.done) done++; }); });
  const booked = state.bookings.filter(b => b.booked).length;
  return { total, done, booked, totalBookings: state.bookings.length };
}

        <div class="day-info">
          <div class="day-meta">Day ${d.day} · ${d.date} · ${d.location}</div>
          <div class="day-title">${d.title}</div>
        </div>
        <span class="day-badge">${d.vibe}</span>
        <div class="day-progress"><div class="day-progress-fill" style="width:${progress}%"></div></div>
        <span class="day-arrow">▾</span>
      </div>
      ${isOpen ? `
        <div class="day-content">
          <div class="day-divider"></div>
          ${d.items.map((item, ii) => renderActivity(item, di, ii)).join('')}
          <div class="add-activity-row">
            <input class="add-time-input" id="add-time-${di}" placeholder="Time" />
            <input class="add-input" id="add-label-${di}" placeholder="Add an activity..." onkeydown="if(event.key==='Enter')addActivity(${di})" />
            <select class="add-select" id="add-type-${di}">
              <option value="activity">Activity</option>
              <option value="food">Food</option>
              <option value="beach">Beach</option>
              <option value="transport">Transport</option>
              <option value="hotel">Lodging</option>
            </select>
            <button class="add-btn" onclick="addActivity(${di})">Add</button>
          </div>
          <div class="tip-box">
            <div class="tip-title">Insider Tip</div>
            <div class="tip-text">${d.tip}</div>
          </div>
          ${addonsHtml}
          <div class="day-notes">
            <textarea class="notes-textarea" placeholder="Family notes for this day..."
              onchange="updateNotes(${di}, this.value)">${d.notes || ''}</textarea>
          </div>
          <div class="cash-estimate">Est. cash spend: ${d.cash}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderBookingDetails(details) {
  return details.map(d => {
    if (d.section) return `<div class="booking-detail-section">${d.section}</div>`;
    if (d.link)    return `<div class="booking-detail-row"><a href="${d.href}" target="_blank" class="booking-detail-link">${d.link}</a></div>`;
    if (d.warn)    return `<div class="booking-detail-warning">${d.warn}</div>`;
    if (d.note)    return `<div class="booking-detail-note">${d.note}</div>`;
    return `<div class="booking-detail-row"><span class="booking-detail-label">${d.row}:</span> ${d.val}</div>`;
  }).join('');
}

function toggleBookingDetails(id) {
  const card = document.getElementById(id);
  const btn  = document.getElementById('btn-' + id);
  if (!card) return;
  const isOpen = card.classList.toggle('open');
  if (btn) btn.classList.toggle('open', isOpen);
}

function renderActivity(item, di, ii) {
  const did = `bd-${di}-${ii}`;
  const bdHtml = item.bookingDetails ? `
    <button class="booking-details-toggle" id="btn-${did}" onclick="event.stopPropagation();toggleBookingDetails('${did}')">
      📋 Booking Details <span class="bd-arrow">▸</span>
    </button>
    <div class="booking-details-card" id="${did}">
      ${renderBookingDetails(item.bookingDetails)}
    </div>` : '';
  return `<div class="activity-item type-${item.type} ${item.done ? 'done' : ''}">
    <div class="activity-check ${item.done ? 'checked' : ''}" onclick="toggleActivity(${di},${ii})">
      ${item.done ? '✓' : ''}
    </div>
    <div class="activity-time">${item.time}</div>
    <div class="activity-label">${item.label}${bdHtml}</div>
    <button class="activity-remove" onclick="removeActivity(${di},${ii})">✕</button>
  </div>`;
}

function toggleDay(di) { state.openDay = state.openDay === di ? -1 : di; render(); }
function toggleActivity(di, ii) { state.days[di].items[ii].done = !state.days[di].items[ii].done; render(); }

function addActivity(di) {
  const time = document.getElementById(`add-time-${di}`).value || '—';
  const label = document.getElementById(`add-label-${di}`).value.trim();
  const type = document.getElementById(`add-type-${di}`).value;
  if (!label) return;
  state.days[di].items.push({ time, label, type, done: false });
  render();
}

function removeActivity(di, ii) { state.days[di].items.splice(ii, 1); render(); }
function updateNotes(di, val) { state.days[di].notes = val; saveState(state); }
function toggleBooking(bi) { state.bookings[bi].booked = !state.bookings[bi].booked; render(); }

function resetAll() {
  if (confirm('Reset all data? This will clear all changes, notes, and checkmarks.')) {
    localStorage.removeItem('hawaii-trip-2026-v3');
    state = { days: DEFAULT_DAYS, bookings: DEFAULT_BOOKINGS, openDay: 0 };
    render();
  }
}

render();
</script>

</body>
</html>
