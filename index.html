<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Island Hawaii · June 2–14, 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: transparent;
  --surface: rgba(255,255,255,0.80);
  --surface2: rgba(255,255,255,0.65);
  --border: rgba(255,255,255,0.55);
  --text: #12344d;
  --text-muted: rgba(18,52,77,0.65);
  --text-muted2: rgba(18,52,77,0.42);
  --accent: #d4007a;
  --accent-dim: rgba(212,0,122,0.10);
  --green: #00896b;
  --green-dim: rgba(0,137,107,0.12);
  --blue: #0077b6;
  --blue-dim: rgba(0,119,182,0.12);
  --orange: #e05c00;
  --orange-dim: rgba(224,92,0,0.12);
  --red: #c0392b;
  --red-dim: rgba(192,57,43,0.12);
  --purple: #7b2d8b;
  --purple-dim: rgba(123,45,139,0.12);
  --cyan: #0096c7;
  --cyan-dim: rgba(0,150,199,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: linear-gradient(160deg,rgba(0,170,210,0.20) 0%,rgba(0,50,110,0.25) 100%), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80') center/cover fixed no-repeat;
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

/* Header */
.header { text-align: center; padding: 40px 0 30px; }
.header-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.header h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 36px; font-weight: 700; margin-bottom: 6px; }
.header-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

/* Stats Bar */
.stats-bar {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  padding: 16px; background: rgba(255,255,255,0.93); border-radius: 12px;
  border: 1px solid var(--border); margin-bottom: 30px;
}
.stat { text-align: center; min-width: 80px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted2); }

/* Legend */
.legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Day Cards */
.day-card {
  border: 1px solid rgba(255,255,255,0.75); border-radius: 14px;
  margin-bottom: 8px; overflow: hidden; transition: all 0.2s ease;
  background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 20px rgba(0,100,160,0.12);
}
.day-card.open { background: rgba(20,24,36,0.72); border-color: rgba(255,255,255,0.12); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
.day-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; user-select: none;
  background: none; border: none; width: 100%;
  color: var(--text); font-family: inherit; text-align: left;
}
.day-header:hover { background: rgba(212,0,122,0.06); }
.day-icon { font-size: 24px; line-height: 1; }
.day-info { flex: 1; min-width: 0; }
.day-meta { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted2); }
.day-title { font-size: 16px; font-weight: 600; margin-top: 2px; }
.day-badge {
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06); color: var(--text-muted);
  white-space: nowrap;
}
.day-progress {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
.day-progress-fill { height: 100%; background: linear-gradient(90deg,#00b4d8,#d4007a); border-radius: 2px; transition: width 0.3s; }
.day-arrow { font-size: 16px; color: var(--text-muted2); transition: transform 0.2s; }
.day-card.open .day-arrow { transform: rotate(180deg); }

/* Day Content */
.day-content { padding: 0 16px 16px; }
.day-divider { border-top: 1px solid var(--border); margin-bottom: 14px; }

/* Activity Items */
.activity-item {
  display: flex; gap: 10px; padding: 10px 12px;
  border-radius: 10px; margin-bottom: 6px;
  align-items: flex-start; position: relative;
  transition: opacity 0.2s;
}
.activity-item.done { opacity: 0.5; }
.activity-item.done .activity-label { text-decoration: line-through; }
.activity-check {
  width: 20px; height: 20px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.2);
  background: none; cursor: pointer; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent; transition: all 0.15s;
}
.activity-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.activity-time {
  min-width: 65px; font-size: 11px; font-weight: 700;
  padding-top: 3px; letter-spacing: 0.3px;
}
.activity-label { font-size: 13px; line-height: 1.5; flex: 1; }
.activity-remove {
  background: none; border: none; color: var(--text-muted2);
  cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0;
  transition: opacity 0.15s;
}
.activity-item:hover .activity-remove { opacity: 1; }

/* Type Colors */
.type-activity { background: var(--green-dim); }
.type-activity .activity-time { color: var(--green); }
.type-activity .activity-label { color: #78d890; }
.type-food { background: var(--orange-dim); }
.type-food .activity-time { color: var(--orange); }
.type-food .activity-label { color: #e8b868; }
.type-beach { background: var(--cyan-dim); }
.type-beach .activity-time { color: var(--cyan); }
.type-beach .activity-label { color: #70e0f8; }
.type-transport { background: rgba(140,160,190,0.1); }
.type-transport .activity-time { color: #90a8c0; }
.type-transport .activity-label { color: #b0c4d8; }
.type-hotel { background: var(--purple-dim); }
.type-hotel .activity-time { color: var(--purple); }
.type-hotel .activity-label { color: #c8b0e8; }

/* Add Activity */
.add-activity-row {
  display: flex; gap: 6px; margin-top: 10px;
}
.add-input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.65);
  color: var(--text); font-family: inherit; font-size: 13px;
}
.add-input::placeholder { color: var(--text-muted2); }
.add-input:focus { outline: none; border-color: var(--accent); }
.add-select {
  padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.65);
  color: var(--text); font-family: inherit; font-size: 12px;
}
.add-select:focus { outline: none; border-color: var(--accent); }
.add-time-input {
  width: 80px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.65);
  color: var(--text); font-family: inherit; font-size: 12px;
}
.add-btn {
  padding: 8px 14px; border-radius: 8px; border: none;
  background: var(--accent); color: #000; font-weight: 600;
  cursor: pointer; font-size: 13px; white-space: nowrap;
}
.add-btn:hover { background: #f5d060; }

/* Tip Box */
.tip-box {
  margin-top: 14px; padding: 12px 14px;
  background: var(--accent-dim); border-radius: 10px;
  border-left: 3px solid var(--accent);
}
.tip-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.tip-text { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.65); }

/* Day Notes */
.day-notes {
  margin-top: 10px;
}
.notes-textarea {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.65);
  color: var(--text); font-family: inherit; font-size: 12px;
  resize: vertical; min-height: 50px; line-height: 1.5;
}
.notes-textarea::placeholder { color: var(--text-muted2); }
.notes-textarea:focus { outline: none; border-color: var(--accent); }

/* Cash Estimate */
.cash-estimate {
  margin-top: 8px; font-size: 11px; color: var(--text-muted2);
  text-align: right;
}

/* Footer */
.footer {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  margin-top: 30px; padding: 20px; border-radius: 12px;
  background: rgba(255,255,255,0.93); border: 1px solid var(--border);
  text-align: center;
}
.footer-total-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.footer-total { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; }
.footer-sub { font-size: 12px; color: var(--text-muted2); margin-top: 4px; }

/* Booking Checklist */
.booking-section {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  margin-top: 20px; padding: 20px; border-radius: 12px;
  background: rgba(255,255,255,0.93); border: 1px solid var(--border);
}
.booking-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.booking-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.booking-item:last-child { border-bottom: none; }
.booking-status {
  padding: 3px 10px; border-radius: 20px; font-size: 10px;
  font-weight: 600; cursor: pointer; user-select: none;
  letter-spacing: 0.5px;
}
.status-pending { background: var(--red-dim); color: var(--red); }
.status-booked { background: var(--green-dim); color: var(--green); }
.booking-name { flex: 1; }

/* Reset Button */
.reset-section { text-align: center; margin-top: 20px; }
.reset-btn {
  padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
  background: none; color: var(--text-muted); cursor: pointer;
  font-size: 12px; font-family: inherit;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

@media (max-width: 600px) {
  .header h1 { font-size: 28px; }
  .stats-bar { gap: 8px; padding: 12px; }
  .stat-value { font-size: 18px; }
  .add-activity-row { flex-wrap: wrap; }
  .add-time-input { width: 100%; }
  .add-select { width: 100%; }
  .activity-remove { opacity: 1; }
}

/* Dual Clock / Countdown */
.clock-section {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  margin-bottom: 20px; padding: 18px 24px;
  background: rgba(255,255,255,0.93); border-radius: 12px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 0;
}
.clock-divider { width: 1px; height: 64px; background: var(--border); margin: 0 28px; }
.clock-unit { text-align: center; }
.clock-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted2); margin-bottom: 6px; }
.clock-time {
  font-family: 'Courier New', 'Lucida Console', monospace;
  font-weight: 700; letter-spacing: 2px;
}
.clock-time.hawaii { font-size: 34px; color: var(--accent); }
.clock-time.florida { font-size: 24px; color: var(--text-muted); }
.clock-date { font-size: 11px; color: var(--text-muted2); margin-top: 5px; }
.countdown-section {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  margin-bottom: 20px; padding: 22px 24px;
  background: rgba(255,255,255,0.93); border-radius: 12px;
  border: 1px solid var(--border); text-align: center;
}
.countdown-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.countdown-time {
  font-family: 'Courier New', 'Lucida Console', monospace;
  font-size: 30px; font-weight: 700; color: var(--accent); letter-spacing: 3px;
}
.countdown-sub { font-size: 12px; color: var(--text-muted2); margin-top: 8px; }
@media (max-width: 600px) {
  .clock-time.hawaii { font-size: 26px; }
  .clock-time.florida { font-size: 20px; }
  .clock-divider { margin: 0 16px; }
  .countdown-time { font-size: 22px; }
}

/* Volcano Status */
.volcano-section {
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  margin-bottom: 20px; padding: 16px; border-radius: 12px;
  background: rgba(255,255,255,0.93); border: 1px solid var(--border);
}
.volcano-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.volcano-link {
  display: inline-block; padding: 8px 16px; border-radius: 8px;
  background: var(--red-dim); color: var(--red); text-decoration: none;
  font-size: 12px; font-weight: 600; margin-top: 8px;
  transition: background 0.15s;
}
.volcano-link:hover { background: rgba(248,113,113,0.2); }
.volcano-info { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; }

/* Add-ons */
.addons-box {
  margin-top: 10px; padding: 10px 14px;
  background: var(--blue-dim); border-radius: 10px;
  border-left: 3px solid var(--blue);
}
.addons-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
.addon-item { font-size: 12px; color: rgba(255,255,255,0.55); padding: 2px 0; }

/* Booking Details Expandable */
.booking-details-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 3px 9px; border-radius: 5px;
  background: none; border: 1px solid rgba(96,165,250,0.3);
  color: var(--blue); font-size: 11px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit; text-decoration: none !important;
}
.booking-details-toggle:hover { background: var(--blue-dim); border-color: var(--blue); }
.booking-details-toggle .bd-arrow { transition: transform 0.2s; display: inline-block; }
.booking-details-toggle.open .bd-arrow { transform: rotate(90deg); }
.booking-details-card {
  margin-top: 8px; padding: 12px 14px;
  background: var(--blue-dim); border-radius: 10px;
  border-left: 3px solid var(--blue); display: none;
}
.booking-details-card.open { display: block; }
.booking-detail-section {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--blue); margin: 10px 0 4px; font-weight: 700;
}
.booking-detail-section:first-child { margin-top: 0; }
.booking-detail-row { font-size: 12px; color: rgba(255,255,255,0.65); padding: 2px 0; line-height: 1.6; }
.booking-detail-label { color: rgba(255,255,255,0.88); font-weight: 600; }
.booking-detail-link { color: var(--blue); text-decoration: none; font-size: 12px; }
.booking-detail-link:hover { text-decoration: underline; }
.booking-detail-note { font-size: 12px; color: rgba(255,255,255,0.5); padding: 2px 0; line-height: 1.6; }
.booking-detail-warning { font-size: 12px; color: var(--orange); padding: 2px 0; line-height: 1.6; }
.activity-item.done .booking-details-toggle { opacity: 0.6; text-decoration: none !important; }

/* ── Activity Timers ── */
.timer-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Courier New', monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 0.5px; padding: 3px 9px; border-radius: 5px;
  margin-top: 5px; transition: background 0.4s, color 0.4s;
}
.timer-green  { background:rgba(52,211,153,0.13); color:#34d399; border:1px solid rgba(52,211,153,0.3); }
.timer-yellow { background:rgba(251,191,36,0.13); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
.timer-orange { background:rgba(251,146,60,0.15); color:#fb923c; border:1px solid rgba(251,146,60,0.35); }
.timer-red    { background:rgba(248,113,113,0.15); color:#f87171; border:1px solid rgba(248,113,113,0.4);
                animation:pulse-red 0.8s ease-in-out infinite; }
.timer-active { background:rgba(240,192,64,0.18); color:#f0c040; border:1px solid rgba(240,192,64,0.5);
                animation:pulse-gold 1.5s ease-in-out infinite; }
.timer-done   { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.08); }
.timer-future { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.35); border:1px solid rgba(255,255,255,0.08); }
.timer-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.timer-green  .timer-dot { background:#34d399; }
.timer-yellow .timer-dot { background:#fbbf24; }
.timer-orange .timer-dot { background:#fb923c; }
.timer-red    .timer-dot { background:#f87171; }
.timer-active .timer-dot { background:#f0c040; }
.travel-hint { font-size:10px; color:rgba(255,255,255,0.28); margin-top:2px; }
@keyframes pulse-red  { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
@keyframes pulse-gold { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.75;transform:scale(1.04);} }

/* ── Sound Toggle ── */
.sound-toggle {
  position:fixed; bottom:24px; right:20px; z-index:999;
  width:50px; height:50px; border-radius:50%;
  background:rgba(15,17,23,0.88); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.15); color:var(--text);
  font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 24px rgba(0,0,0,0.5); transition:transform 0.2s,border-color 0.2s;
}
.sound-toggle:hover { transform:scale(1.1); border-color:var(--accent); }

/* ═══ TROPICAL HAWAIIAN THEME ═══════════════════════════════════════════════ */
.header h1 { background: linear-gradient(135deg,#d4007a 0%,#0077b6 55%,#00b4d8 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-label { color:#d4007a; }
.header-sub { color:rgba(18,52,77,0.72); }
.stat-value { color:#d4007a; }
.stat-label { color:rgba(18,52,77,0.48); }
.hibiscus-row { text-align:center; font-size:26px; letter-spacing:10px; margin:-4px 0 14px; animation:sway 5s ease-in-out infinite; }
@keyframes sway { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} }
.type-activity { background:rgba(0,150,199,0.10); border-left:3px solid #0096c7; border-radius:0 8px 8px 0; }
.type-activity .activity-time { color:#0077b6; } .type-activity .activity-label { color:#124e6b; }
.type-food { background:rgba(212,0,122,0.09); border-left:3px solid #d4007a; border-radius:0 8px 8px 0; }
.type-food .activity-time { color:#c0006b; } .type-food .activity-label { color:#9a0056; }
.type-beach { background:rgba(0,180,216,0.10); border-left:3px solid #00b4d8; border-radius:0 8px 8px 0; }
.type-beach .activity-time { color:#0096c7; } .type-beach .activity-label { color:#006e95; }
.type-transport { background:rgba(0,137,107,0.09); border-left:3px solid #00896b; border-radius:0 8px 8px 0; }
.type-transport .activity-time { color:#007057; } .type-transport .activity-label { color:#005744; }
.type-hotel { background:rgba(123,45,139,0.09); border-left:3px solid #7b2d8b; border-radius:0 8px 8px 0; }
.type-hotel .activity-time { color:#6a2478; } .type-hotel .activity-label { color:#55196a; }
.day-badge { background:rgba(212,0,122,0.08); color:rgba(18,52,77,0.60); border:1px solid rgba(212,0,122,0.18); }
.day-title { color:#12344d; font-weight:700; } .day-meta { color:rgba(18,52,77,0.42); }
.tip-box { background:linear-gradient(135deg,rgba(212,0,122,0.07),rgba(0,119,182,0.07)); border-left:3px solid #d4007a; }
.tip-title { color:#d4007a; } .tip-text { color:rgba(18,52,77,0.68); }
.addons-box { background:rgba(0,119,182,0.08); border-left:3px solid #0077b6; }
.addons-title { color:#0077b6; } .addon-item { color:rgba(18,52,77,0.60); }
.booking-details-card { background:rgba(0,119,182,0.07); border-left:3px solid #0077b6; }
.booking-details-toggle { border-color:rgba(0,119,182,0.32); color:#0077b6; }
.booking-details-toggle:hover { background:rgba(0,119,182,0.09); }

function loadState() {
  try {
    const saved = localStorage.getItem('hawaii-trip-2026-v4');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { days: DEFAULT_DAYS, bookings: DEFAULT_BOOKINGS, openDay: 0 };
}

function saveState(state) {
  try { localStorage.setItem('hawaii-trip-2026-v4', JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function getStats() {
  let total = 0, done = 0;
  state.days.forEach(d => { d.items.forEach(i => { total++; if (i.done) done++; }); });
  const booked = state.bookings.filter(b => b.booked).length;
  return { total, done, booked, totalBookings: state.bookings.length };
}

// ─── Hawaii Time Utilities ───────────────────────────────────────────────────
const TRIP_START_MS = Date.UTC(2026, 5, 2, 10, 0, 0);   // Jun 2 2026 00:00 HST = 10:00 UTC
const TRIP_END_MS   = Date.UTC(2026, 5, 15, 9, 59, 59); // Jun 14 2026 23:59 HST = Jun 15 09:59 UTC

function getHawaiiDate() {
  // Hawaii = UTC-10, no DST
  return new Date(Date.now() - 10 * 3600000);
}
function getFloridaDate() {
  // Florida EDT in June = UTC-4
  return new Date(Date.now() - 4 * 3600000);
}
function fmt12(d) {
  let h = d.getUTCHours(), m = d.getUTCMinutes(), s = d.getUTCSeconds();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + ' ' + ap;
}
function fmtDate(d) {
  const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return DS[d.getUTCDay()] + ', ' + MS[d.getUTCMonth()] + ' ' + d.getUTCDate();
}
function buildClockHtml() {
  const now = Date.now();
  if (now < TRIP_START_MS) {
    const diff = TRIP_START_MS - now;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return `<div class="countdown-section">
      <div class="countdown-label">🌺 Hawaii departure countdown</div>
      <div class="countdown-time" id="clock-countdown">${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s</div>
      <div class="countdown-sub">Trip starts Jun 2, 2026 — Kailua-Kona, Big Island</div>
    </div>`;
  } else if (now > TRIP_END_MS) {
    return `<div class="clock-section" style="justify-content:center;gap:12px;flex-direction:column">
      <div style="font-size:32px;text-align:center">🤙</div>
      <div style="font-size:18px;font-weight:700;text-align:center">Mahalo! Trip complete</div>
      <div style="font-size:12px;color:var(--text-muted2);text-align:center">What a trip. Big Island forever. 🌴</div>
    </div>`;
  } else {
    const hi = getHawaiiDate();
    const fl = getFloridaDate();
    return `<div class="clock-section">
      <div class="clock-unit">
        <div class="clock-label">🌴 hawaii (hst)</div>
        <div class="clock-time hawaii" id="clock-hi">${fmt12(hi)}</div>
        <div class="clock-date" id="clock-hi-date">${fmtDate(hi)}</div>
      </div>
      <div class="clock-divider"></div>
      <div class="clock-unit">
        <div class="clock-label">🏠 florida (et)</div>
        <div class="clock-time florida" id="clock-fl">${fmt12(fl)}</div>
        <div class="clock-date" id="clock-fl-date">${fmtDate(fl)}</div>
      </div>
    </div>`;
  }
}

function tickClock() {
  const now = Date.now();
  if (now >= TRIP_START_MS && now <= TRIP_END_MS) {
    const hi = getHawaiiDate(), fl = getFloridaDate();
    const ehi = document.getElementById('clock-hi');
    const efl = document.getElementById('clock-fl');
    const ehid = document.getElementById('clock-hi-date');
    const efld = document.getElementById('clock-fl-date');
    if (ehi) ehi.textContent = fmt12(hi);
    if (efl) efl.textContent = fmt12(fl);
    if (ehid) ehid.textContent = fmtDate(hi);
    if (efld) efld.textContent = fmtDate(fl);
  } else {
    // Countdown: update in place
    const cEl = document.getElementById('clock-countdown');
    if (cEl && now < TRIP_START_MS) {
      const diff = TRIP_START_MS - now;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      cEl.textContent = d + 'd ' + String(h).padStart(2,'0') + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
    }
  }
}
setInterval(tickClock, 1000);

// Helper: current Hawaii day index (0 = Jun 2) for activity highlighting
function getHawaiiDayIndex() {
  const hi = getHawaiiDate();
  // Trip days: Jun 2–13 (days[0]–days[11])
  const tripDayOne = Date.UTC(2026, 5, 2); // Jun 2 UTC (used as offset base)
  const hiMidnight = Date.UTC(hi.getUTCFullYear(), hi.getUTCMonth(), hi.getUTCDate());
  return Math.floor((hiMidnight - tripDayOne) / 86400000);
}

// Helper: Hawaii minutes since midnight for activity timer
function getHawaiiMinutes() {
  const hi = getHawaiiDate();
  return hi.getUTCHours() * 60 + hi.getUTCMinutes();
}

function parseTime(t) {
  if (!t || t==='—') return null;
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h=parseInt(m[1]), mn=parseInt(m[2]);
  if (m[3].toUpperCase()==='PM'&&h!==12) h+=12;
  if (m[3].toUpperCase()==='AM'&&h===12) h=0;
  return h*60+mn;
}

function fmtCountdown(diffMin) {
  if (diffMin<=0) return 'GO NOW';
  if (diffMin<60) return diffMin+'m';
  const h=Math.floor(diffMin/60), mn=diffMin%60;
  return mn>0 ? h+'h '+mn+'m' : h+'h';
}

function getTimerState(items, idx, hiNowMin, dayIdx) {
  const item = items[idx];
  const startMin = parseTime(item.time);
  if (startMin===null) return null;
  let nextMin=null;
  for (let j=idx+1;j<items.length;j++) {
    const nm=parseTime(items[j].time);
    if (nm!==null){nextMin=nm;break;}
  }
  const travelMin = item.travelMin||0;
  const leaveByMin = startMin - travelMin;
  const minToLeave = leaveByMin - hiNowMin;
  const minToStart = startMin - hiNowMin;
  const isActive = hiNowMin>=startMin && (nextMin===null||hiNowMin<nextMin);
  const isDone = nextMin!==null ? hiNowMin>=nextMin : hiNowMin>=startMin+90;
  if (isDone) return {cls:'timer-done',label:'✓ DONE',dot:false};
  if (isActive) {
    if (nextMin!==null) {
      const leaveForItem = items.slice(idx+1).find(it=>parseTime(it.time)!==null);
      const nextTravel = leaveForItem?(leaveForItem.travelMin||0):0;
      const leaveAt = nextMin-nextTravel;
      const minLeft = leaveAt-hiNowMin;
      const key = dayIdx+'-'+idx;
      if (minLeft<=1&&!alarmFired.has(key)){alarmFired.add(key);playAnimalSound(dayIdx);}
      if (minLeft<=0) return {cls:'timer-red',label:'🚨 LEAVE NOW',dot:true};
      if (minLeft<=10) return {cls:'timer-red',label:'🔴 LEAVE IN '+minLeft+'m',dot:true};
      if (minLeft<=20) return {cls:'timer-orange',label:'🟡 LEAVE IN '+fmtCountdown(minLeft),dot:true};
      return {cls:'timer-active',label:'● ACTIVE — leave in '+fmtCountdown(minLeft),dot:true};
    }
    return {cls:'timer-active',label:'● ACTIVE NOW',dot:true};
  }
  if (travelMin>0&&minToLeave<=0&&minToStart>0) return {cls:'timer-red',label:'🚨 LEAVE NOW',dot:true};
  if (travelMin>0&&minToLeave<=10) return {cls:'timer-orange',label:'🔴 LEAVE IN '+fmtCountdown(minToLeave),dot:true};
  if (travelMin>0&&minToLeave<=25) return {cls:'timer-yellow',label:'🟡 LEAVE IN '+fmtCountdown(minToLeave),dot:true};
  if (minToStart<=20) return {cls:'timer-yellow',label:'Starts in '+fmtCountdown(minToStart),dot:true};
  if (minToStart<=60) return {cls:'timer-green',label:'Starts in '+fmtCountdown(minToStart),dot:true};
  return {cls:'timer-future',label:'@ '+item.time,dot:false};
}

function tickTimers() {
  const now=Date.now();
  if(now<TRIP_START_MS||now>TRIP_END_MS) return;
  const hiNowMin=getHawaiiMinutes();
  const dayIdx=getHawaiiDayIndex();
  if(dayIdx<0||dayIdx>=state.days.length) return;
  const items=state.days[dayIdx].items;
  items.forEach((item,ii)=>{
    const el=document.getElementById('timer-'+dayIdx+'-'+ii);
    if(!el) return;
    const ts=getTimerState(items,ii,hiNowMin,dayIdx);
    if(!ts) return;
    el.className='timer-badge '+ts.cls;
    el.innerHTML=(ts.dot?'<span class="timer-dot"></span>':'')+ts.label;
  });
}

          <div class="day-divider"></div>
          ${d.items.map((item, ii) => renderActivity(item, di, ii)).join('')}
          <div class="add-activity-row">
            <input class="add-time-input" id="add-time-${di}" placeholder="Time" />
            <input class="add-input" id="add-label-${di}" placeholder="Add an activity..." onkeydown="if(event.key==='Enter')addActivity(${di})" />
            <select class="add-select" id="add-type-${di}">
              <option value="activity">Activity</option>
              <option value="food">Food</option>
              <option value="beach">Beach</option>
              <option value="transport">Transport</option>
              <option value="hotel">Lodging</option>
            </select>
            <button class="add-btn" onclick="addActivity(${di})">Add</button>
          </div>
          <div class="tip-box">
            <div class="tip-title">Insider Tip</div>
            <div class="tip-text">${d.tip}</div>
          </div>
          ${addonsHtml}
          <div class="day-notes">
            <textarea class="notes-textarea" placeholder="Family notes for this day..."
              onchange="updateNotes(${di}, this.value)">${d.notes || ''}</textarea>
          </div>
          <div class="cash-estimate">Est. cash spend: ${d.cash}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderBookingDetails(details) {
  return details.map(d => {
    if (d.section) return `<div class="booking-detail-section">${d.section}</div>`;
    if (d.link)    return `<div class="booking-detail-row"><a href="${d.href}" target="_blank" class="booking-detail-link">${d.link}</a></div>`;
    if (d.warn)    return `<div class="booking-detail-warning">${d.warn}</div>`;
    if (d.note)    return `<div class="booking-detail-note">${d.note}</div>`;
    return `<div class="booking-detail-row"><span class="booking-detail-label">${d.row}:</span> ${d.val}</div>`;
  }).join('');
}

function toggleBookingDetails(id) {
  const card = document.getElementById(id);
  const btn  = document.getElementById('btn-' + id);
  if (!card) return;
  const isOpen = card.classList.toggle('open');
  if (btn) btn.classList.toggle('open', isOpen);
}

function renderActivity(item, di, ii) {
  const did = `bd-${di}-${ii}`;
  const bdHtml = item.bookingDetails ? `
    <button class="booking-details-toggle" id="btn-${did}" onclick="event.stopPropagation();toggleBookingDetails('${did}')">
      📋 Booking Details <span class="bd-arrow">▸</span>
    </button>
    <div class="booking-details-card" id="${did}">
      ${renderBookingDetails(item.bookingDetails)}
    </div>` : '';
  // Live timer badge (today's activities only, Hawaii time)
  let timerHtml = '';
  const nowMs = Date.now();
  if (nowMs >= TRIP_START_MS && nowMs <= TRIP_END_MS) {
    const dayIdx = getHawaiiDayIndex();
    if (di === dayIdx) {
      const ts = getTimerState(state.days[di].items, ii, getHawaiiMinutes(), dayIdx);
      if (ts) timerHtml = `<div class="timer-badge ${ts.cls}" id="timer-${di}-${ii}">${ts.dot?'<span class="timer-dot"></span>':''}${ts.label}</div>`;
    }
  }
  const travelHint = item.travelMin > 0 ? `<div class="travel-hint">🚗 ${item.travelMin} min drive</div>` : '';
  return `<div class="activity-item type-${item.type} ${item.done ? 'done' : ''}">
    <div class="activity-check ${item.done ? 'checked' : ''}" onclick="toggleActivity(${di},${ii})">
      ${item.done ? '✓' : ''}
    </div>
    <div class="activity-time">${item.time}</div>
    <div class="activity-label">${item.label}${bdHtml}${timerHtml}${travelHint}</div>
    <button class="activity-remove" onclick="removeActivity(${di},${ii})">✕</button>
  </div>`;
}

function toggleDay(di) { state.openDay = state.openDay === di ? -1 : di; render(); }
function toggleActivity(di, ii) { state.days[di].items[ii].done = !state.days[di].items[ii].done; render(); }

function addActivity(di) {
  const time = document.getElementById(`add-time-${di}`).value || '—';
  const label = document.getElementById(`add-label-${di}`).value.trim();
  const type = document.getElementById(`add-type-${di}`).value;
  if (!label) return;
  state.days[di].items.push({ time, label, type, done: false });
  render();
}

function removeActivity(di, ii) { state.days[di].items.splice(ii, 1); render(); }
function updateNotes(di, val) { state.days[di].notes = val; saveState(state); }
function toggleBooking(bi) { state.bookings[bi].booked = !state.bookings[bi].booked; render(); }

function resetAll() {
  if (confirm('Reset all data? This will clear all changes, notes, and checkmarks.')) {
    localStorage.removeItem('hawaii-trip-2026-v4');
    state = { days: DEFAULT_DAYS, bookings: DEFAULT_BOOKINGS, openDay: 0 };
    render();
  }
}


// Fish spawner
(function spawnFish() {
  var layer = document.createElement('div');
  layer.className = 'fish-layer';
  document.body.insertBefore(layer, document.body.firstChild);
  var pool = ['🐠','🐡','🐟','🦈','🐬','🐙','🦑','🐠','🐡','🐟'];
  pool.forEach(function(e,i) {
    var el = document.createElement('span');
    var goRight = i % 2 === 0;
    el.className = 'fish' + (goRight ? '' : ' rl');
    el.textContent = e;
    // Flip emoji direction for right-to-left swimmers
    if (!goRight) el.style.transform = 'scaleX(-1)';
    var sz = Math.round(15 + Math.random()*14);
    var top = (4 + Math.random()*90).toFixed(1);
    var dur = (20 + Math.random()*25).toFixed(1);
    var delay = -(Math.random()*35).toFixed(1);
    el.style.cssText = 'font-size:'+sz+'px;top:'+top+'%;animation-duration:'+dur+'s;animation-delay:'+delay+'s;';
    if (!goRight) el.style.cssText += 'transform:scaleX(-1);';
    layer.appendChild(el);
  });
})();

render();
</script>
