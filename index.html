<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Island Hawaii · June 2–14, 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:rgba(255,255,255,0.08);--text:#e8eaf0;--text-muted:rgba(255,255,255,0.5);--text-muted2:rgba(255,255,255,0.35);--accent:#f0c040;--accent-dim:rgba(240,192,64,0.15);--green:#34d399;--green-dim:rgba(52,211,153,0.12);--orange:#fb923c;--orange-dim:rgba(251,146,60,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--cyan:#22d3ee;--cyan-dim:rgba(34,211,238,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.container{max-width:900px;margin:0 auto;padding:20px 16px 80px;}
.header{text-align:center;padding:40px 0 30px;}
.header-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.header h1{font-family:'Playfair Display',Georgia,serif;font-size:36px;font-weight:700;margin-bottom:6px;}
.header-sub{font-size:14px;color:var(--text-muted);margin-bottom:20px;}
.stats-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:16px;background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:30px;}
.stat{text-align:center;min-width:80px;}.stat-value{font-size:22px;font-weight:700;color:var(--accent);}.stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted2);}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}.legend-dot{width:8px;height:8px;border-radius:50%;}
.day-card{border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:all 0.2s ease;}
.day-card.open{background:var(--surface);border-color:rgba(255,255,255,0.12);}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;background:none;border:none;width:100%;color:var(--text);font-family:inherit;text-align:left;}
.day-header:hover{background:rgba(255,255,255,0.02);}
.day-icon{font-size:24px;line-height:1;}.day-info{flex:1;min-width:0;}
.day-meta{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted2);}
.day-title{font-size:16px;font-weight:600;margin-top:2px;}
.day-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.06);color:var(--text-muted);white-space:nowrap;}
.day-progress{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;}
.day-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;}
.day-arrow{font-size:16px;color:var(--text-muted2);transition:transform 0.2s;}.day-card.open .day-arrow{transform:rotate(180deg);}
.day-content{padding:0 16px 16px;}.day-divider{border-top:1px solid var(--border);margin-bottom:14px;}
.activity-item{display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;align-items:flex-start;position:relative;transition:opacity 0.2s;}
.activity-item.done{opacity:0.5;}.activity-item.done .activity-label{text-decoration:line-through;}
.activity-check{width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,0.2);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all 0.15s;}
.activity-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.activity-time{min-width:65px;font-size:11px;font-weight:700;padding-top:3px;}.activity-label{font-size:13px;line-height:1.5;flex:1;}
.activity-remove{background:none;border:none;color:var(--text-muted2);cursor:pointer;font-size:16px;padding:0 4px;opacity:0;transition:opacity 0.15s;}
.activity-item:hover .activity-remove{opacity:1;}
.type-activity{background:var(--green-dim);}.type-activity .activity-time{color:var(--green);}.type-activity .activity-label{color:#78d890;}
.type-food{background:var(--orange-dim);}.type-food .activity-time{color:var(--orange);}.type-food .activity-label{color:#e8b868;}
.type-beach{background:var(--cyan-dim);}.type-beach .activity-time{color:var(--cyan);}.type-beach .activity-label{color:#70e0f8;}
.type-transport{background:rgba(140,160,190,0.1);}.type-transport .activity-time{color:#90a8c0;}.type-transport .activity-label{color:#b0c4d8;}
.type-hotel{background:var(--purple-dim);}.type-hotel .activity-time{color:var(--purple);}.type-hotel .activity-label{color:#c8b0e8;}
.add-activity-row{display:flex;gap:6px;margin-top:10px;}
.add-input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;}
.add-input::placeholder{color:var(--text-muted2);}.add-input:focus{outline:none;border-color:var(--accent);}
.add-select{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px;}
.add-time-input{width:80px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px;}
.add-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;}
.add-btn:hover{background:#f5d060;}
.tip-box{margin-top:14px;padding:12px 14px;background:var(--accent-dim);border-radius:10px;border-left:3px solid var(--accent);}
.tip-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.tip-text{font-size:12px;line-height:1.6;color:rgba(255,255,255,0.65);}
.day-notes{margin-top:10px;}
.notes-textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px;resize:vertical;min-height:50px;line-height:1.5;}
.notes-textarea::placeholder{color:var(--text-muted2);}.notes-textarea:focus{outline:none;border-color:var(--accent);}
.cash-estimate{margin-top:8px;font-size:11px;color:var(--text-muted2);text-align:right;}
.footer{margin-top:30px;padding:20px;border-radius:12px;background:var(--surface);border:1px solid var(--border);text-align:center;}
.footer-total-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.footer-total{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;}
.footer-sub{font-size:12px;color:var(--text-muted2);margin-top:4px;}
.booking-section{margin-top:20px;padding:20px;border-radius:12px;background:var(--surface);border:1px solid var(--border);}
.booking-title{font-size:14px;font-weight:600;margin-bottom:12px;}
.booking-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.booking-item:last-child{border-bottom:none;}
.booking-status{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;user-select:none;}
.status-pending{background:var(--red-dim);color:var(--red);}.status-booked{background:var(--green-dim);color:var(--green);}
.booking-name{flex:1;}
.reset-section{text-align:center;margin-top:20px;}
.reset-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}
@media(max-width:600px){.header h1{font-size:28px;}.stats-bar{gap:8px;padding:12px;}.stat-value{font-size:18px;}.add-activity-row{flex-wrap:wrap;}.add-time-input,.add-select{width:100%;}.activity-remove{opacity:1;}}
</style>
</head>

function loadState(){try{const s=localStorage.getItem('hawaii-trip-2026');if(s)return JSON.parse(s);}catch(e){}return{days:JSON.parse(JSON.stringify(DEFAULT_DAYS)),bookings:JSON.parse(JSON.stringify(DEFAULT_BOOKINGS)),openDay:0};}
function saveState(st){try{localStorage.setItem('hawaii-trip-2026',JSON.stringify(st));}catch(e){}}
let state=loadState();
function getStats(){let total=0,done=0;state.days.forEach(d=>{d.items.forEach(i=>{total++;if(i.done)done++;});});const booked=state.bookings.filter(b=>b.booked).length;return{total,done,booked,totalBookings:state.bookings.length};}
function renderActivity(item,di,ii){
  return '<div class="activity-item type-'+item.type+(item.done?' done':'')+'">'+
    '<div class="activity-check'+(item.done?' checked':'')+'" onclick="toggleActivity('+di+','+ii+')">'+(item.done?'\u2713':'')+
    '</div><div class="activity-time">'+item.time+'</div><div class="activity-label">'+item.label+
    '</div><button class="activity-remove" onclick="removeActivity('+di+','+ii+')">\u2715</button></div>';}
function renderDay(d,di){
  const isOpen=state.openDay===di;
  const prog=d.items.length>0?(d.items.filter(i=>i.done).length/d.items.length)*100:0;
  let html='<div class="day-card'+(isOpen?' open':'')+'"><div class="day-header" onclick="toggleDay('+di+')">'+
    '<span class="day-icon">'+d.icon+'</span><div class="day-info">'+
    '<div class="day-meta">Day '+d.day+' \u00b7 '+d.date+' \u00b7 '+d.location+'</div>'+
    '<div class="day-title">'+d.title+'</div></div>'+
    '<span class="day-badge">'+d.vibe+'</span>'+
    '<div class="day-progress"><div class="day-progress-fill" style="width:'+prog+'%"></div></div>'+
    '<span class="day-arrow">&#9662;</span></div>';
  if(isOpen){
    html+='<div class="day-content"><div class="day-divider"></div>'+
      d.items.map((item,ii)=>renderActivity(item,di,ii)).join('')+
      '<div class="add-activity-row">'+
      '<input class="add-time-input" id="add-time-'+di+'" placeholder="Time" />'+
      '<input class="add-input" id="add-label-'+di+'" placeholder="Add an activity..." onkeydown="if(event.key===\'Enter\')addActivity('+di+')" />'+
      '<select class="add-select" id="add-type-'+di+'">'+
      '<option value="activity">Activity</option><option value="food">Food</option>'+
      '<option value="beach">Beach</option><option value="transport">Transport</option>'+
      '<option value="hotel">Lodging</option></select>'+
      '<button class="add-btn" onclick="addActivity('+di+')">Add</button></div>'+
      '<div class="tip-box"><div class="tip-title">Insider Tip</div><div class="tip-text">'+d.tip+'</div></div>'+
      '<div class="day-notes"><textarea class="notes-textarea" placeholder="Family notes for this day..." onchange="updateNotes('+di+',this.value)">'+(d.notes||'')+'</textarea></div>'+
      '<div class="cash-estimate">Est. cash spend: '+d.cash+'</div></div>';}
  return html+'</div>';}
function render(){
  const stats=getStats();
  let html='<div class="header"><div class="header-label">Big Island, Hawai\u02bbi</div>'+
    '<h1>June 2\u201314, 2026</h1>'+
    '<div class="header-sub">7 Passengers &middot; 12 Days &middot; 2 Jeeps &middot; 0 Tourist Traps</div></div>'+
    '<div class="stats-bar">'+
    '<div class="stat"><div class="stat-value">12</div><div class="stat-label">Days</div></div>'+
    '<div class="stat"><div class="stat-value">7</div><div class="stat-label">People</div></div>'+
    '<div class="stat"><div class="stat-value">'+stats.done+'/'+stats.total+'</div><div class="stat-label">Activities</div></div>'+
    '<div class="stat"><div class="stat-value">'+stats.booked+'/'+stats.totalBookings+'</div><div class="stat-label">Booked</div></div></div>'+
    '<div class="legend">'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Activity</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Food</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>Beach</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#90a8c0"></div>Transport</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Lodging</div></div>'+
    state.days.map((d,di)=>renderDay(d,di)).join('')+
    '<div class="booking-section"><div class="booking-title">&#128203; Booking Checklist</div>'+
    state.bookings.map((b,bi)=>'<div class="booking-item"><div class="booking-status '+(b.booked?'status-booked':'status-pending')+'" onclick="toggleBooking('+bi+')">'+(b.booked?'\u2713 BOOKED':'PENDING')+'</div><div class="booking-name">'+b.name+'</div></div>').join('')+'</div>'+
    '<div class="footer"><div class="footer-total-label">Estimated Cash Spend (Activities, Food, Transport)</div>'+
    '<div class="footer-total">~$14,000 \u2013 $15,500</div>'+
    '<div class="footer-sub">Flights ($7,123) &amp; hotels covered by points &middot; ~249K pts rebate pending</div></div>'+
    '<div class="reset-section"><button class="reset-btn" onclick="resetAll()">Reset All Data</button></div>';
  document.getElementById('app').innerHTML=html;
  saveState(state);}
function toggleDay(di){state.openDay=state.openDay===di?-1:di;render();}
function toggleActivity(di,ii){state.days[di].items[ii].done=!state.days[di].items[ii].done;render();}
function addActivity(di){const time=document.getElementById('add-time-'+di).value||'\u2014';const label=document.getElementById('add-label-'+di).value.trim();const type=document.getElementById('add-type-'+di).value;if(!label)return;state.days[di].items.push({time,label,type,done:false});render();}
function removeActivity(di,ii){state.days[di].items.splice(ii,1);render();}
function updateNotes(di,val){state.days[di].notes=val;saveState(state);}
function toggleBooking(bi){state.bookings[bi].booked=!state.bookings[bi].booked;render();}
function resetAll(){if(confirm('Reset all data? This will clear all changes, notes, and checkmarks.')){localStorage.removeItem('hawaii-trip-2026');state={days:JSON.parse(JSON.stringify(DEFAULT_DAYS)),bookings:JSON.parse(JSON.stringify(DEFAULT_BOOKINGS)),openDay:0};render();}}
render();
</script></body></html>
